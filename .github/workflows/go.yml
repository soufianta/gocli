name: Go CI

on:
  push:
    branches: [ "main" ]
jobs:
  build-test-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Download dependencies
        run: go mod tidy

      - name: Build CLI
        run: go build -o app .

      - name: Run tests (if any)
        run: go test ./...

      - name: Run CLI with sample input
        run: |
          echo "Generating password (default 8 characters):"
          ./app password
